<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-SOS | 고려폴리머 스마트 오더 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 12px; }

  .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 0; }

  /* Header */
  .header { background: #1a3a5c; color: #fff; border-radius: 16px 16px 0 0; padding: 18px 20px 14px; display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 40px; height: 40px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .header-logo span { font-size: 18px; font-weight: 800; color: #1a3a5c; letter-spacing: -1px; }
  .header-info h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .header-info p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .header-status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.8); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Chat area */
  .chat-area { background: #fff; flex: 1; min-height: 440px; max-height: 520px; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; border-left: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

  /* Messages */
  .msg { display: flex; gap: 8px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #1a3a5c; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar span { font-size: 12px; color: #fff; font-weight: 600; }
  .bubble { max-width: 82%; padding: 10px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; }
  .msg.bot .bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #1a3a5c; color: #fff; border-bottom-right-radius: 4px; }

  /* Quick replies */
  .quick-replies { display: flex; flex-wrap: wrap; gap: 7px; padding: 4px 0 2px; }
  .qr-btn { background: #fff; border: 1.5px solid #1a3a5c; color: #1a3a5c; border-radius: 20px; padding: 6px 14px; font-size: 12.5px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .qr-btn:hover { background: #1a3a5c; color: #fff; }
  .qr-btn:active { transform: scale(0.97); }

  /* Input area */
  .input-area { background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 16px 16px; padding: 12px 14px; display: flex; gap: 8px; align-items: flex-end; }
  .input-area input { flex: 1; border: 1px solid #d1d5db; border-radius: 22px; padding: 9px 15px; font-size: 14px; outline: none; font-family: inherit; color: #1e293b; }
  .input-area input:focus { border-color: #1a3a5c; }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #1a3a5c; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .send-btn:hover { background: #243f5e; }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* Stock badge */
  .stock-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 4px; font-weight: 600; }
  .stock-ok { background: #dcfce7; color: #166534; }
  .stock-warn { background: #fef9c3; color: #854d0e; }
  .stock-out { background: #fee2e2; color: #991b1b; }

  /* Footer note */
  .footer-note { text-align: center; font-size: 11px; color: #9ca3af; padding: 10px 0 4px; }
  .footer-note a { color: #1a3a5c; text-decoration: none; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 4px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* Reset btn */
  .reset-area { text-align: center; padding: 6px 0 2px; }
  .reset-btn { background: none; border: none; font-size: 11.5px; color: #6b7280; cursor: pointer; text-decoration: underline; font-family: inherit; }

  /* Back button */
  .back-bar { display: flex; gap: 8px; padding: 4px 0 2px; }
  .back-btn { background: none; border: 1px solid #d1d5db; color: #6b7280; border-radius: 16px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .back-btn:hover { border-color: #1a3a5c; color: #1a3a5c; }

  /* Stock badge inline (버튼 내부용) */
  .badge-ok { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-weight: 600; background: #dcfce7; color: #166534; }
  .badge-warn { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-weight: 600; background: #fef9c3; color: #854d0e; }
  .badge-out { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-weight: 600; background: #fee2e2; color: #991b1b; }

  /* 메인으로 버튼 */
  .home-btn { display: inline-flex; align-items: center; gap: 5px; background: #1a3a5c; color: #fff; border: none; border-radius: 20px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.15s; }
  .home-btn:hover { background: #243f5e; }

  /* 재단주문 입력 안내박스 */
  .custom-notice { background: #f0f7ff; border: 1px solid #bdd7f5; border-radius: 10px; padding: 10px 13px; font-size: 12.5px; line-height: 1.7; color: #1e3a5f; margin-top: 4px; }

</style>
</head>

    div.innerHTML = `<div class="avatar"><span>KP</span></div><div class="bubble">${text}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${text}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addQuickReplies(options, onSelect, showBack) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

  if (showBack) {
    const backBar = document.createElement('div');
    backBar.className = 'back-bar';
    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.innerHTML = '&#8592; 뒤로';
    backBtn.onclick = () => { div.remove(); goBack(); };
    backBar.appendChild(backBtn);
    wrapper.appendChild(backBar);
  }

  const qr = document.createElement('div');
  qr.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    if (opt.html) { btn.innerHTML = opt.html; } else { btn.textContent = opt.label; }
    btn.onclick = () => {
      div.remove();
      onSelect(opt.value !== undefined ? opt.value : opt.label, opt.label);
    };
    qr.appendChild(btn);
  });
  wrapper.appendChild(qr);
  div.appendChild(wrapper);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar"><span>KP</span></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function botReply(text, quickReplies, showBack) {
  showTyping();
  await delay(500);
  removeTyping();
  addMsg(text, false);
  if (quickReplies) addQuickReplies(quickReplies, handleInput, showBack);
}

// 뒤로가기 히스토리 스택
let stateHistory = [];

function pushHistory() {
  stateHistory.push({ state: session.state, data: JSON.parse(JSON.stringify(session.data)) });
}

function goBack() {
  if (stateHistory.length === 0) { startMenu(); return; }
  const prev = stateHistory.pop();
  session.state = prev.state;
  session.data = prev.data;
  // 이전 상태로 돌아가서 해당 단계 다시 렌더링
  replayState(prev.state, prev.data);
}

// 재고 뱃지 HTML (버튼 내부 렌더링용)
function badgeHtml(n) {
  if (n <= 0) return `<span class="badge-out">품절</span>`;
  if (n <= 10) return `<span class="badge-warn">소량 ${n}장</span>`;
  return `<span class="badge-ok">재고 ${n}장</span>`;
}

// 복층판 브랜드 목록 (에스폴 제외, 수입판/국산판만 표시)
function getMWBrands() {
  const raw = unique(INVENTORY['복층판'], '구분');
  return raw
    .filter(b => !b.includes('에스폴') && !b.includes('합계'))
    .map(b => {
      if (b === '렉산') return { label: '수입판', value: '렉산' };
      if (b.includes('동신')) return { label: '국산판', value: b };
      return { label: b, value: b };
    });
}

  }
  else if (s === 'ACRYLIC_COLOR') {

      {label:'규격판 선택 (재고 규격)', value:'stock'},

  else if (s === 'ACRYLIC_ORDER_TYPE') {

    if (value==='stock') {

      const specs = [...new Map(items.map(i=>[i.규격,i])).values()]

async function submitOrder() {
  const d = session.data;
  const prod = d.product;
  const ts = new Date().toLocaleString('ko-KR');
  const orderNo = 'KP' + Date.now().toString().slice(-6);

  let summary = `<b>주문 접수 완료 ✅</b><br><br>`;
  summary += `주문번호: <b>${orderNo}</b><br>`;
  summary += `일시: ${ts}<br>`;
  summary += `제품: <b>${prod.name}</b><br>`;
  if (d.품명) summary += `품명: ${d.품명}<br>`;
  if (d.제품) summary += `제품: ${d.제품}<br>`;
  if (d.구분표시) summary += `구분: ${d.구분표시}<br>`;
  else if (d.구분 && !['수입판','국산판'].includes(d.구분)) summary += `구분: ${d.구분}<br>`;
  if (d.색상) summary += `색상: ${d.색상}<br>`;
  if (d.두께) summary += `두께: ${d.두께}mm<br>`;
  if (d.주문유형 === 'custom') {
    summary += `주문유형: <b>재단규격</b><br>`;
    summary += `재단치수: <b>${d.재단가로} × ${d.재단세로} mm</b><br>`;
  } else {
    if (d.규격) summary += `규격: ${d.규격}<br>`;
    if (d.가로 && d.세로) summary += `규격: ${cleanDim(d.가로)}×${cleanDim(d.세로)}<br>`;
  }
  summary += `수량: <b>${d.수량}장</b><br><br>`;
  summary += `담당자가 확인 후 연락드리겠습니다.<br>📞 051-644-8877 · 010-8025-5575`;

  orderLog.push({ orderNo, ts, ...d });
  session = { state: 'DONE', data: {} };

  await botReply(summary);
  await delay(600);

  // 메인으로 버튼 별도 렌더링
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar"><span>KP</span></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="home-btn" onclick="startMenu()">&#8962; 메인으로 돌아가기</button>
      <div class="quick-replies">
        <button class="qr-btn" onclick="startMenu()">추가 주문하기</button>
        <button class="qr-btn" onclick="addMsg('감사합니다. 이용해 주셔서 감사합니다. 😊', false); this.closest('.msg').remove(); session.state='DONE';">상담 종료</button>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function resetPrompt() {
  setTimeout(() => {
    addQuickReplies([{ label: '처음으로', value: '__RESTART__' }], handleInput);
  }, 300);
}

function handleSend() {
  const input = document.getElementById('userInput');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';

  if (val === '__RESTART__' || session.state === 'DONE' || session.state === 'INIT') {
    startMenu();
    return;
  }
  handleInput(val, val);
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

// 특수값 처리
const _origHandle = handleInput;
window.handleInput = async function(value, label) {
  if (value === '__RESTART__') { startMenu(); return; }
  if (value === '__END__') { addMsg('감사합니다. 이용해 주셔서 감사합니다. 😊', false); session.state = 'DONE'; return; }
  await _origHandle(value, label);
};

// 시작
window.onload = () => {
  setTimeout(startMenu, 400);
};
</script>
